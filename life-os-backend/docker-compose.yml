# Run from this directory: cd life-os-backend && docker compose up -d
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lifeops
    ports:
      - "5432:5432"
    volumes:
      - lifeops_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lifeops"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  lifeops_pgdata:
